plugins {
	id 'io.spring.dependency-management' version '1.1.7' apply false
	id 'org.springframework.boot' version '3.4.2' apply false
	id 'com.gorylenko.gradle-git-properties' version '2.4.2' apply false

	id 'base' apply true
}

ext {
	// gradle wrapper版本
	// https://gradle.org/releases
	set('gradleWrapperVersion', '8.12.1')

	// 核心框架版本
	set('springBootVersion', '3.4.2')

	// 微调 SpringBoot依赖中的版本号
	// https://docs.spring.io/spring-boot/appendix/dependency-versions/properties.html

	// 项目相关配置
	// set('foo', 'foo')
}

group = 'com.mycompany.myproject'
version = '1.0.0'
description = 'xxx'

tasks.named('wrapper') { task ->
	distributionUrl = "https://mirrors.cloud.tencent.com/gradle/gradle-${gradleWrapperVersion}-bin.zip"
}

tasks.register('zipJar', Zip) { task ->
	group = 'build'
	description = 'Zip jar(s)'

	from(layout.projectDirectory.asFile) {
		include('README.md')
		include('LICENSE.txt')
	}

	from(layout.projectDirectory.file('build')) {
		into("lib")
		include('**/*.jar')
	}

	destinationDirectory = layout.projectDirectory.dir('build')
	archiveFileName = "${rootProject.name}-${rootProject.version}.zip"
}

tasks.named('build') { task ->
	var after = getAllLeafProjectName().collect { "${it}:build" }
	mustRunAfter(after)
	finalizedBy('zipJar')
}

tasks.named('clean') { task ->
	var after = getAllLeafProjectName().collect { "${it}:clean" }
	mustRunAfter(after)
}

// ---------------------------------------------------------------------------------------------------------------------

List<String> getAllLeafProjectName() {
	var list = []
	rootProject.subprojects.forEach { level1 ->
		level1.subprojects.forEach { level2 ->
			list.add(":${level1.name}:${level2.name}")
		}
	}
	return list;
}
